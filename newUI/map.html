<!DOCTYPE html>
<html lang="en">
<head>
  <title>GridWatch | Outage Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --taupe: #C8C0B8; --salmon: #FF8B80; --charcoal: #484848;
      --cream: #F5F4F0; --paper: #FAF9F6;
      --taupe-d: #9a9188; --taupe-l: #dedad5;
      --mint: #8EE07A; --red: #d94040;
    }
    body { background: var(--cream); color: var(--charcoal); font-family: 'DM Sans', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    nav {
      position: sticky; top: 0; z-index: 100;
      height: 56px; background: var(--charcoal);
      border-bottom: 3px solid var(--salmon);
      display: flex; align-items: center; padding: 0 6vw; gap: 2px;
    }
    .nav-logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 22px; color: var(--cream); margin-right: 40px; flex-shrink: 0; }
    .nav-logo em { color: var(--salmon); font-style: normal; }
    .nav-btn {
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase; color: var(--taupe);
      padding: 6px 18px; cursor: pointer; background: transparent; border: none;
      border-bottom: 2px solid transparent; transition: color .15s;
    }
    .nav-btn:hover { color: var(--cream); }
    .nav-btn.active { color: var(--salmon); border-bottom-color: var(--salmon); }
    .live { display: flex; align-items: center; gap: 6px; margin-left: auto; font-family: 'Syne Mono', monospace; font-size: 10px; color: var(--taupe); }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); box-shadow: 0 0 8px var(--red); animation: pulse .9s infinite; }

    .content { flex: 1; padding: 48px 6vw; }
    h1 { font-family: 'Playfair Display', serif; font-weight: 900; font-size: clamp(40px, 7vw, 80px); line-height: 1; letter-spacing: -.02em; margin-bottom: 16px; }
    h1 em { color: var(--salmon); font-style: normal; }
    h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: .04em; text-transform: uppercase; color: var(--taupe-d); margin-bottom: 12px; }

    /* Stats bar */
    .stats-bar {
      display: flex; gap: 16px; margin: 20px 0 28px; flex-wrap: wrap;
    }
    .stat {
      background: var(--paper); border: 2px solid var(--charcoal);
      padding: 10px 20px; box-shadow: 4px 4px 0 var(--taupe);
      font-family: 'Syne Mono', monospace;
    }
    .stat .val { font-size: 1.5rem; font-weight: 700; color: var(--salmon); display: block; }
    .stat .lbl { font-size: 0.65rem; color: var(--taupe-d); text-transform: uppercase; letter-spacing: 1px; }

    #map {
      height: 560px; width: 100%;
      border: 3px solid var(--charcoal);
      box-shadow: 8px 8px 0 var(--taupe);
      margin-bottom: 16px;
    }
    #status {
      font-family: 'Syne Mono', monospace; font-size: 10px;
      color: var(--taupe-d); letter-spacing: .05em;
    }

    /* Legend */
    .legend {
      display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap;
      font-family: 'Syne', sans-serif; font-size: 11px;
      font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      color: var(--taupe-d);
    }
    .leg-item { display: flex; align-items: center; gap: 7px; }
    .leg-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
    .toggle-btn {
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      background: var(--charcoal); color: var(--taupe); border: 2px solid var(--taupe-d);
      padding: 5px 14px; cursor: pointer; transition: all .15s;
    }
    .toggle-btn.active { background: var(--salmon); color: var(--paper); border-color: var(--salmon); }

    footer { background: var(--charcoal); border-top: 3px solid var(--salmon); padding: 20px 6vw; display: flex; justify-content: space-between; align-items: center; }
    .footer-logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 16px; color: var(--cream); }
    .footer-logo em { color: var(--salmon); font-style: normal; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">Grid<em>Watch</em></div>
    <button class="nav-btn" onclick="location.href='main.html'">Home</button>
    <button class="nav-btn" onclick="location.href='predictions.html'">Predictions</button>
    <button class="nav-btn active" onclick="location.href='map.html'">Outage Map</button>
    <button class="nav-btn" onclick="location.href='about.html'">About</button>
    <div class="live"><div class="live-dot"></div><span id="live-label">LIVE</span></div>
  </nav>

  <div class="content">
    <h1>Outage<em> Map</em></h1>
    <h3>Real-time power outages — Dominion Energy service territory</h3>

    <div class="stats-bar">
      <div class="stat"><span class="val" id="stat-out">—</span><span class="lbl">Customers Out</span></div>
      <div class="stat"><span class="val" id="stat-events">—</span><span class="lbl">Active Outages</span></div>
      <div class="stat"><span class="val" id="stat-pct">—</span><span class="lbl">% Affected</span></div>
      <div class="stat"><span class="val" id="stat-updated">—</span><span class="lbl">Last Updated</span></div>
    </div>

    <div id="map"></div>

    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#d32f2f"></div>Critical (500+)</div>
      <div class="leg-item"><div class="leg-dot" style="background:#f57c00"></div>Major (100–499)</div>
      <div class="leg-item"><div class="leg-dot" style="background:#fbc02d"></div>Moderate (25–99)</div>
      <div class="leg-item"><div class="leg-dot" style="background:#388e3c"></div>Minor (&lt;25)</div>
      <button class="toggle-btn" id="heat-toggle" onclick="toggleHeat()">Heatmap</button>
      <button class="toggle-btn" onclick="manualRefresh()" id="refresh-btn">↻ Refresh</button>
      <div style="margin-left:auto"><span id="status">Loading outage data...</span> <span id="countdown" style="font-family:'Syne Mono',monospace;font-size:10px;color:var(--taupe-d)"></span></div>
    </div>
  </div>

  <footer>
    <div class="footer-logo">GRID<em>WATCH</em></div>
  </footer>

<script>
// ---------------------------------------------------------------------------
// Config — path to the outages.json file committed by GitHub Actions
// ---------------------------------------------------------------------------
const OUTAGES_JSON = "outages.json";
const REFRESH_MS   = 60 * 1000; // re-fetch every 60 seconds

// ---------------------------------------------------------------------------
// Map setup
// ---------------------------------------------------------------------------
const map = L.map("map").setView([37.5, -79.5], 7);

L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a> &copy; <a href="https://carto.com">CARTO</a>',
  maxZoom: 19
}).addTo(map);

let markers    = [];
let heatLayer  = null;
let heatMode   = false;

function severityColor(n) {
  if (n >= 500) return "#d32f2f";
  if (n >= 100) return "#f57c00";
  if (n >= 25)  return "#fbc02d";
  return "#388e3c";
}

function toggleHeat() {
  if (typeof L.heatLayer !== 'function') {
    document.getElementById("status").textContent = "Heatmap library failed to load — check network.";
    return;
  }
  heatMode = !heatMode;
  document.getElementById("heat-toggle").classList.toggle("active", heatMode);
  markers.forEach(m => heatMode ? map.removeLayer(m) : m.addTo(map));
  if (heatLayer) {
    heatMode ? heatLayer.addTo(map) : map.removeLayer(heatLayer);
  }
}

// ---------------------------------------------------------------------------
// Load + render outages
// ---------------------------------------------------------------------------
async function loadOutages() {
  try {
    const res  = await fetch(OUTAGES_JSON + "?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    // Update stat bar
    const s = data.summary || {};
    document.getElementById("stat-out").textContent     = (s.customers_out  || 0).toLocaleString();
    document.getElementById("stat-events").textContent  = (s.total_outages  || data.outages.length);
    document.getElementById("stat-pct").textContent     = (s.pct_out        || 0) + "%";

    const ts = new Date(data.pulled_at_utc);
    document.getElementById("stat-updated").textContent =
      ts.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});

    // Clear old layers
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }

    const heatPoints = [];
    const maxCust    = Math.max(1, ...( (data.outages||[]).map(o => o.customers||0) ));

    (data.outages || []).forEach(o => {
      if (o.lat == null || o.lng == null) return;

      // Heatmap point: intensity normalised 0–1
      heatPoints.push([o.lat, o.lng, (o.customers || 1) / maxCust]);

      // Circle marker
      const color  = severityColor(o.customers);
      const radius = Math.max(8, Math.min(40, Math.sqrt(o.customers) * 3));
      const popup =
        "<b>" + (o.provider || "Dominion Energy") + "</b><br>" +
        "<b>Customers out:</b> " + (o.customers || 0).toLocaleString() + "<br>" +
        "<b>Cause:</b> "         + (o.cause       || "Unknown") + "<br>" +
        "<b>Crew:</b> "          + (o.crew_status || "Unknown") + "<br>" +
        "<b>ETR:</b> "           + (o.etr         || "Unknown") + "<br>" +
        "<small>Incident #" + (o.incident_id || "—") + "</small>";

      const m = L.circleMarker([o.lat, o.lng], {
        radius, color, fillColor: color, fillOpacity: 0.75, weight: 2
      }).bindPopup(popup);

      markers.push(m);
      if (!heatMode) m.addTo(map);
    });

    // Build heat layer
    if (heatPoints.length) {
      heatLayer = L.heatLayer(heatPoints, {
        radius: 35, blur: 25, maxZoom: 10, minOpacity: 0.5,
        gradient: { 0.2: "#388e3c", 0.5: "#fbc02d", 0.75: "#f57c00", 1.0: "#d32f2f" }
      });
      if (heatMode) heatLayer.addTo(map);
    }

    const now = new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit",second:"2-digit"});
    document.getElementById("status").textContent =
      markers.length + " outage(s) plotted — last fetched " + now;
    document.getElementById("live-label").textContent = "LIVE";

  } catch (err) {
    console.error("Failed to load outages:", err);
    document.getElementById("status").textContent = "Could not load outage data — " + err.message;
    document.getElementById("live-label").textContent = "ERROR";
  }
}

let secondsUntilRefresh = REFRESH_MS / 1000;
let countdownTimer = null;

function startCountdown() {
  clearInterval(countdownTimer);
  secondsUntilRefresh = REFRESH_MS / 1000;
  countdownTimer = setInterval(() => {
    secondsUntilRefresh--;
    document.getElementById("countdown").textContent = "— next in " + secondsUntilRefresh + "s";
    if (secondsUntilRefresh <= 0) {
      clearInterval(countdownTimer);
    }
  }, 1000);
}

async function manualRefresh() {
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true;
  btn.textContent = "↻ Loading...";
  await loadOutages();
  btn.disabled = false;
  btn.textContent = "↻ Refresh";
}

async function autoRefresh() {
  await loadOutages();
  startCountdown();
}

loadOutages();
startCountdown();
setInterval(autoRefresh, REFRESH_MS);
</script>
</body>
</html>
