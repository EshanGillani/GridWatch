<!DOCTYPE html>
<html lang="en">
<head>
<title>GridWatch | Outage Map</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

:root{
--taupe:#C8C0B8;
--salmon:#FF8B80;
--charcoal:#484848;
--cream:#F5F4F0;
--taupe-l:#dedad5;
--red:#d94040;
}

body{
background:var(--cream);
font-family:'DM Sans',sans-serif;
color:var(--charcoal);
}

nav{
position:sticky;
top:0;
height:56px;
background:var(--charcoal);
border-bottom:3px solid var(--salmon);
display:flex;
align-items:center;
padding:0 6vw;
}

.nav-logo{
font-family:'Playfair Display',serif;
font-weight:900;
font-size:22px;
color:white;
margin-right:40px;
}

.nav-logo em{
color:var(--salmon);
font-style:normal;
}

.nav-btn{
font-family:'Syne',sans-serif;
font-size:11px;
font-weight:700;
letter-spacing:.12em;
text-transform:uppercase;
color:#c8c0b8;
padding:6px 18px;
cursor:pointer;
background:transparent;
border:none;
}

.content{
padding:72px 6vw;
}

h1{
font-family:'Playfair Display',serif;
font-weight:900;
font-size:60px;
margin-bottom:20px;
}

h1 em{
color:var(--salmon);
font-style:normal;
}

#map{
height:600px;
width:100%;
margin-top:40px;
border:3px solid var(--taupe-l);
}

footer{
background:var(--charcoal);
border-top:3px solid var(--salmon);
padding:20px 6vw;
margin-top:40px;
}

.footer-logo{
font-family:'Playfair Display',serif;
font-weight:900;
color:white;
}

.footer-logo em{
color:var(--salmon);
font-style:normal;
}

</style>
</head>

<body>

<nav>
<div class="nav-logo">Grid<em>Watch</em></div>
<button class="nav-btn" onclick="location.href='main.html'">Home</button>
<button class="nav-btn" onclick="location.href='predictions.html'">Predictions</button>
<button class="nav-btn">Outage Map</button>
<button class="nav-btn" onclick="location.href='about.html'">About</button>
</nav>

<div class="content">

<h1>Outage <em>Map</em></h1>

<p>Interact with the map below to see grid outages affecting your area.</p>

<div id="map"></div>

</div>

<footer>
<div class="footer-logo">GRID<em>WATCH</em></div>
</footer>

<script>

const map = L.map("map").setView([37.5,-78.5],7);

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{ attribution:"© OpenStreetMap contributors" }
).addTo(map);

let markers=[];

const outages=[
{provider:"Dominion Energy",lat:37.54,lng:-77.43,customers:1200},
{provider:"Dominion Energy",lat:38.03,lng:-78.48,customers:450},
{provider:"Appalachian Power",lat:37.27,lng:-79.94,customers:800},
{provider:"NOVEC",lat:38.75,lng:-77.47,customers:320},
{provider:"Dominion Energy",lat:36.85,lng:-76.29,customers:1500},
{provider:"Dominion Energy",lat:38.90,lng:-77.03,customers:2100},
{provider:"Appalachian Power",lat:37.13,lng:-80.41,customers:650}
];

function loadOutages(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

outages.forEach(outage=>{

const marker=L.circleMarker(
[outage.lat,outage.lng],
{
radius:Math.sqrt(outage.customers)/2,
color:"red",
fillColor:"#d94040",
fillOpacity:0.75
}
).addTo(map);

marker.bindPopup(
"<b>"+outage.provider+"</b><br>Customers affected: "+outage.customers
);

markers.push(marker);

});

}

loadOutages();

setInterval(loadOutages,30000);

</script>

</body>
</html>
