<!DOCTYPE html>
<html lang="en">
<head>
  <title>GridWatch | Predictions</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Leaflet Map Library -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --taupe:#C8C0B8; --salmon:#FF8B80; --charcoal:#484848;
      --cream:#F5F4F0; --cream2:#ECEAE4; --paper:#FAF9F6;
      --taupe-d:#9a9188; --taupe-l:#dedad5; --salmon-d:#e56b5f;
      --mint:#8EE07A;
    }

    body {
      background: var(--cream);
      color: var(--charcoal);
      font-family: 'DM Sans', sans-serif;
      margin: 0;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 56px;
      background: var(--charcoal);
      border-bottom: 3px solid var(--salmon);
      display: flex;
      align-items: center;
      padding: 0 6vw;
      gap: 2px;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 22px;
      color: var(--cream);
      margin-right: 40px;
    }

    .nav-logo em { color: var(--salmon); }

    .nav-btn {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--taupe);
      padding: 6px 18px;
      cursor: pointer;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
    }

    .nav-btn.active {
      color: var(--salmon);
      border-bottom-color: var(--salmon);
    }

    .content {
      padding: 72px 6vw 30px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(40px,7vw,80px);
      margin-bottom: 16px;
    }

    h1 em { color: var(--salmon); }

    h3 {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      text-transform: uppercase;
      color: var(--taupe-d);
      margin-bottom: 12px;
    }

    p {
      font-size: 14px;
      line-height: 1.85;
      color: var(--taupe-d);
      max-width: 520px;
    }

    /* Map styling */
    #map {
      width: 88%;
      height: 500px;
      margin: 40px auto;
      border-radius: 10px;
      border: 3px solid var(--salmon);
    }

    footer {
      background: var(--charcoal);
      border-top: 3px solid var(--salmon);
      padding: 20px 6vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-logo {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 16px;
      color: var(--cream);
    }

    .footer-logo em { color: var(--salmon); }

  </style>
</head>

<body>

<nav>
  <div class="nav-logo">Grid<em>Watch</em></div>
  <button class="nav-btn" onclick="location.href='main.html'">Home</button>
  <button class="nav-btn active" onclick="location.href='predictions.html'">Predictions</button>
  <button class="nav-btn" onclick="location.href='map.html'">Outage Map</button>
  <button class="nav-btn" onclick="location.href='about.html'">About</button>
</nav>

<div class="content">
  <h1>Prediction & <em>Analysis</em></h1>
  <h3>Welcome to the Predictions page. Use the map below to find outage predictions for your area.</h3>
  <p>Live outage risk predictions powered by weather data.</p>
  <div class="prediction-box">

<h2>Live Outage Prediction</h2>

<p>Outage Risk: <span id="risk">Loading...</span></p>

<p>Temperature: <span id="temp">Loading...</span></p>

<p>Wind Gusts: <span id="wind">Loading...</span></p>

</div>
</div>

<!-- Map Container -->
<div id="map"></div>

<footer>
  <div class="footer-logo">GRID<em>WATCH</em></div>
</footer>

<script>
const map = L.map('map').setView([37.5538, -77.4603], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

const LAT = 37.5538, LON = -77.4603;

// Simple risk model matching the trained RandomForest logic
function computeRisk(w) {
  let score = 0;
  const gusts = w.wind_gusts_10m || 0;
  const wind  = w.wind_speed_10m || 0;
  const precip = w.precipitation || 0;
  const snow  = w.snowfall || 0;

  if (gusts > 50)      score += 0.40;
  else if (gusts > 35) score += 0.25;
  else if (gusts > 20) score += 0.10;

  if (wind > 40)       score += 0.20;
  else if (wind > 25)  score += 0.10;

  if (precip > 1.0)    score += 0.30;
  else if (precip > 0.3) score += 0.15;

  if (snow > 2)        score += 0.30;
  else if (snow > 0.5) score += 0.15;

  return Math.min(1, score);
}

async function loadPrediction() {
  const url =
    `https://api.open-meteo.com/v1/forecast` +
    `?latitude=${LAT}&longitude=${LON}` +
    `&current=temperature_2m,relative_humidity_2m,wind_speed_10m,` +
    `wind_gusts_10m,precipitation,snowfall,cloud_cover` +
    `&temperature_unit=fahrenheit`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const w = data.current;

    const risk = computeRisk(w);
    document.getElementById("risk").innerText = (risk * 100).toFixed(1) + "%";
    document.getElementById("temp").innerText = w.temperature_2m.toFixed(1) + "°F";
    document.getElementById("wind").innerText = w.wind_gusts_10m.toFixed(1) + " mph gusts";

  } catch (err) {
    document.getElementById("risk").innerText = "Unavailable";
    document.getElementById("temp").innerText = "Unavailable";
    document.getElementById("wind").innerText = "Unavailable — " + err.message;
  }
}

loadPrediction();
</script>

</body>
</html>
