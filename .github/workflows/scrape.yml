name: Scrape Dominion Outages

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # allow manual trigger from GitHub UI

permissions:
  contents: write             # needed to commit outages.json back to repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python gridwatchbackend/dominion_outage_scraper.py --json --no-map > newUI/outages.json

      - name: Commit outages.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newUI/outages.json
          git diff --cached --quiet || git commit -m "chore: update outages $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
