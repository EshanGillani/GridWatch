name: Scrape Dominion Outages

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python gridwatchbackend/dominion_outage_scraper.py --json --no-map > newUI/outages.json 2>/dev/null

      - name: Verify output
        run: |
          echo "File size: $(wc -c < newUI/outages.json) bytes"
          head -3 newUI/outages.json

      - name: Commit outages.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add newUI/outages.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update outages $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin main
