<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Gridwatch | Report a Risk</title>
        <link rel="icon" href="gridwatch logo.svg" type="image/svg+xml" sizes="any">
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
        

        <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --taupe: #C8C0B8;
    --salmon: #FF8B80;
    --charcoal: #484848;
    --cream: #F5F4F0;
    --cream2: #ECEAE4;
    --paper: #FAF9F6;
    --taupe-d: #9a9188;
    --taupe-l: #dedad5;
    --salmon-d: #e56b5f;
    --mint: #8ee07a;
}

            body{
                background:#f5f4f0;
                font-family:'DM Sans', sans-serif;
                color:#484848;
            }

            nav{
                position: sticky;
                top: 0;
                z-index: 100;
                height: 56px;
                background: var(--charcoal);
                border-bottom: 3px solid var(--salmon);
                display: flex;
                align-items: center;
                padding: 0 6vw;
                gap: 2px;
            }

            .nav-logo{
                font-family: 'Playfair Display', serif;
                font-weight:900;
                font-size: 22px;
                color: var(--cream);
                margin-right: 40px;
                flex-shrink: 0;
            }

            .nav-logo em {
                color: var(--salmon);
                font-style: normal;
            }

            .nav-btn{
                font-family: 'Syne', sans-serif;
                font-size: 11px;
                font-weight: 700;
                letter-spacing: .12em;
                text-transform: uppercase;
                color: var(--taupe);
                padding: 6px 18px;
                cursor: pointer;
                background: transparent;
                border: none;
                border-bottom: 2px solid transparent;
                border-radius: 0;
                transition: color .15s;
            }

            .nav-btn:hover{
                color: var(--cream);
                background: transparent;
            }

            .nav-btn.active{
                color: var(--salmon);
                border-bottom-color:var(--salmon);
            }

            .nav-btn.expert-btn {
                margin-left: auto;
                color: var(--charcoal);
                background: var(--salmon);
                border-radius: 4px;
                padding: 6px 14px;
                border-bottom: none;
            }

            .nav-btn.expert-btn:hover{
                background:var(--salmon-d);
                color:var(--charcoal);
            }

            .container{
                width:420px;
                margin:80px auto;
                padding:30px;
                border:2px solid #e8e7e2;
                border-radius:10px;
                background:#faf9f6;
            }

            h1{
                font-family:'Syne',sans-serif;
                margin-bottom:20px;
            }

            input, select, textarea{
                width:100%;
                margin-bottom:12px;
                padding:10px;
                border:2px solid #e8e7e2;
                border-radius:6px;
                font-size:14px;
            }

            button{
                padding:10px 18px;
                background: #ff8b80;
                border:none;
                border-radius:6px;
                font-weight:700;
                cursor:pointer;
            }

            button:hover{
                background:#e56b5f;
            }

            #map{
                border:2px solid #e8e7e2;
            }
        </style>
    </head>
    <body>
         <nav>
    <div class="nav-logo"><a href="main.html" style="color: inherit; text-decoration: none;">Grid<em>Watch</em></a></div>
    <button class="nav-btn" onclick="location.href='main.html'"> Home</button>
    <button class="nav-btn" onclick="location.href='predictions.html'">Predictions</button>
    <button class="nav-btn" onclick="location.href='about.html'">About </button>
    <button class="nav-btn active" onclick="location.href='report.html'">Report Risk/Outage</button>
    <button class="nav-btn" onclick="location.href='reports.html'">View Reported Risks and Outages</button>
    <button class="nav-btn expert-btn" onclick="location.href='expert-login.html'">Expert Mode</button>
  </nav>

        <div class="container">
            <h1>Report an Outage Risk</h1>

            <input id="zip" placeholder="Enter a US ZIP Code">

            <select id="type">
                <option value="power_outage">Power Outage</option>
                <option value="flickering_power">Flickering Power</option>
                <option value="downed_line">Downed Power Line</option>
                <option value="tree">Overhanging Tree or Similar Hazard</option>
                <option value="other">Other</option>
            </select>

            <textarea id="description" placeholder="Describe the risk or cause of the outage..."></textarea>
            <label>Upload Image</label>
            <input id="image" type="file" accept="image/*">
            <button onclick="submitReport()">Submit Report</button>

            <p id="msg"></p>

        </div>

        <script>
            


async function submitReport(){

const zip=document.getElementById("zip").value
const type=document.getElementById("type").value
const description=document.getElementById("description").value

const res=await fetch("/api/report",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
zip,
type,
description
})
})

const data=await res.json()
document.getElementById("msg").innerText=data.message
}
        </script>

    </body>
    </html>
