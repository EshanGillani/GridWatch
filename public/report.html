<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Gridwatch | Report a Risk</title>

        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Sans&display=swap" rel="stylesheet"/>

        <style>
            body{
                background:#f5f4f0;
                font-family:'Courier New', Courier, monospace;
                color:#484848;
            }

            .container{
                width:420px;
                margin:120px auto;
                padding:30px;
                border:2px solid #e8e7e2;
                border-radius:10px;
                background:#faf9f6;
            }

            h1{
                font-family:'Syne',sans-serif;
                margin-bottom:20px;
            }

            input, select, textarea{
                width:100%;
                margin-bottom:12px;
                padding:10px;
                border:2px solid #e8e7e2;
                border-radius:6px;
                font-size:14px;
            }

            button{
                padding:10px 18px;
                background: #ff8b80;
                border:none;
                border-radius:6px;
                font-weight:700;
                cursor:pointer;
            }

            button:hover{
                background:#e56b5f;
            }
        </style>
    </head>
    <body>

        <div class="container">
            <h1>Report an Outage Risk</h1>

            <input id="location" placeholder="US City or ZIP Code">

            <select id="type">
                <option value="power_outage">Power Outage</option>
                <option value="flickering_power">Flickering Power</option>
                <option value="downed_line">Downed Power Line</option>
                <option value="other">Other</option>
            </select>

            <textarea id="description" placeholder="Describe the risk or cause of the outage..."></textarea>
            <button onclick="submitReport()">Submit Report</button>

            <p id="msg"></p>

        </div>

        <script>
            async function submitReport(){
                const location=document.getElementById("location").value;
                const type = document.getElementById("type").value;
                const description=document.getElementById("description").value;

                const res = await fetch("/api/report",{
                    method:"POST",
                    headers:{ "Content-Type":"application/json"},
                    body:JSON.stringify({location,type,description})
                });
        

            const data = await res.json();

            document.getElementById("msg").innerText = data.message || data.error;
        }
        </script>

    </body>
    </html>
