<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="icon" href="gridwatch logo.svg" type="image/svg+xml" sizes="any">
  <title>GridWatch | Predictions</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Leaflet Map Library -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --taupe:#C8C0B8; --salmon:#FF8B80; --charcoal:#484848;
      --cream:#F5F4F0; --cream2:#ECEAE4; --paper:#FAF9F6;
      --taupe-d:#9a9188; --taupe-l:#dedad5; --salmon-d:#e56b5f;
      --mint:#8EE07A;
    }

    body {
      background: var(--cream);
      color: var(--charcoal);
      font-family: 'DM Sans', sans-serif;
      margin: 0;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 1001;
      height: 56px;
      background: var(--charcoal);
      border-bottom: 3px solid var(--salmon);
      display: flex;
      align-items: center;
      padding: 0 6vw;
      gap: 2px;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 22px;
      color: var(--cream);
      margin-right: 40px;
    }

    .nav-logo em { color: var(--salmon); }

    .nav-btn {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--taupe);
      padding: 6px 18px;
      cursor: pointer;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
    }

    .nav-btn.active {
      color: var(--salmon);
      border-bottom-color: var(--salmon);
    }
    .nav-btn.expert-btn { margin-left: auto; color: var(--charcoal); background: var(--salmon); border-radius: 4px; padding: 6px 14px; border-bottom: none; }
    .nav-btn.expert-btn:hover { background: var(--salmon-d); color: var(--charcoal); }

    .content {
      padding: 72px 6vw 30px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(40px,7vw,80px);
      margin-bottom: 16px;
    }

    h1 em { color: var(--salmon); }

    h3 {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      text-transform: uppercase;
      color: var(--taupe-d);
      margin-bottom: 12px;
    }

    p {
      font-size: 14px;
      line-height: 1.85;
      color: var(--taupe-d);
      max-width: 520px;
    }

    /* Map styling */
    #map {
      width: 88%;
      height: 500px;
      margin: 40px auto;
      border-radius: 10px;
      border: 3px solid var(--salmon);
    }

    footer {
      background: var(--charcoal);
      border-top: 3px solid var(--salmon);
      padding: 20px 6vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-logo {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 16px;
      color: var(--cream);
    }

    .footer-logo em { color: var(--salmon); }

    #advice {
      width: 88%;
      margin: 0 auto 40px;
      border: 2px solid var(--taupe-l);
      border-radius: 8px;
      padding: 24px 28px;
      background: var(--paper);
    }
    #advice .advice-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    #advice .advice-status {
      font-size: 13px;
      color: var(--taupe-d);
      margin-bottom: 14px;
    }
    #advice ul {
      list-style: none;
      padding: 0;
    }
    #advice ul li {
      font-size: 14px;
      color: var(--taupe-d);
      line-height: 1.7;
      padding: 3px 0 3px 18px;
      position: relative;
    }
    #advice ul li::before {
      content: "—";
      position: absolute;
      left: 0;
      color: var(--taupe);
    }

    /* Email alert subscription */
    .alert-section {
      width: 88%;
      max-width: 560px;
      margin: 0 auto 60px;
      background: var(--paper);
      border: 2px solid var(--taupe-l);
      border-radius: 10px;
      padding: 28px 32px;
      text-align: center;
    }

    .alert-section h3 {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--taupe-d);
      margin-bottom: 18px;
    }

    .alert-form {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .alert-form input[type="email"] {
      flex: 1 1 180px;
      min-width: 0;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 9px 14px;
      border: 2px solid var(--taupe-l);
      border-radius: 6px;
      background: var(--cream);
      color: var(--charcoal);
      outline: none;
      transition: border-color .15s;
    }

    .alert-form input[type="email"]:focus {
      border-color: var(--salmon);
    }

    .alert-form select {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 9px 30px 9px 12px;
      border: 2px solid var(--taupe-l);
      border-radius: 6px;
      background: var(--cream);
      color: var(--charcoal);
      outline: none;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2212%22%20height%3D%2212%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%239a9188%22%20stroke-width%3D%223%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E');
      background-repeat: no-repeat;
      background-position: right 8px center;
    }

    .alert-form select:focus {
      border-color: var(--salmon);
    }

    .alert-form button {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 9px 20px;
      background: var(--salmon);
      color: var(--charcoal);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }

    .alert-form button:hover { background: var(--salmon-d); }
    .alert-form button:disabled { opacity: .6; cursor: default; }

    #alert-msg {
      margin-top: 12px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
    }
    #alert-msg.ok  { color: hsl(120,60%,35%); }
    #alert-msg.err { color: var(--salmon-d); }

  </style>
</head>

<body>

<nav>
  <div class="nav-logo">Grid<span style="color: var(--salmon);">Watch</span></div>
  <button class="nav-btn" onclick="location.href='main.html'">Home</button>
  <button class="nav-btn active" onclick="location.href='predictions.html'">Predictions</button>
  <button class="nav-btn" onclick="location.href='about.html'">About</button>
  <button class="nav-btn" onclick="location.href='report.html'">Report Risk/Outage</button>
  <button class="nav-btn" onclick="location.href='reports.html'">View Reported Risks and Outages</button>
  <button class="nav-btn expert-btn" onclick="location.href='expert-login.html'">Expert Mode</button>
</nav>

<div class="content">
  <h1>
    Prediction & <span style="color: var(--salmon);">Analysis</span>
  </h1>

  <h3>Live outage risk predictions powered by weather data.</h3>

  <div class="prediction-box">
    <!-- Wrap the label and the dynamic dropdown in a flex h3 to keep them inline -->
    <h3 style="font-family: 'Syne', sans-serif; font-weight: 700; color: #989189; display: flex; align-items: center; flex-wrap: wrap; gap: 8px;">
      Current live predictions for

      <!-- DYNAMIC DROPDOWN START -->
      <span style="display: inline-grid; vertical-align: middle; align-items: center;">
        <!-- Invisible mirror that dictates the width -->
        <span id="mirror" style="
          grid-area: 1/1;
          visibility: hidden;
          white-space: pre;
          font-family: 'Syne', sans-serif;
          font-size: 16.72px;
          font-weight: 700;
          padding: 0 25px 0 6px;
        ">RICHMOND, VA</span>

        <select id="options" name="options"
                oninput="document.getElementById('mirror').textContent = this.options[this.selectedIndex].text"
                style="
                  grid-area: 1/1;
                  width: 100%;
                  font-family: 'Syne', sans-serif;
                  background-color: #F5F4F0;
                  color: #989189;
                  padding: 2px 25px 2px 6px;
                  border: 2px solid #E8E7E2;
                  border-radius: 4px;
                  outline: none;
                  font-size: 16.72px;
                  font-weight: 700;
                  -webkit-appearance: none;
                  appearance: none;
                  cursor: pointer;
                  background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2212%22%20height%3D%2212%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23989189%22%20stroke-width%3D%223%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E');
                  background-repeat: no-repeat;
                  background-position: right 6px center;
                ">
          <option value="1">WASHINGTON, DC</option>
          <option value="2">NEW YORK CITY, NY</option>
          <option value="3">LOS ANGELES, CA</option>
          <option value="4">CHICAGO, IL</option>
          <option value="5">HOUSTON, TX</option>
          <option value="6">PHOENIX, AZ</option>
          <option value="7">PHILADELPHIA, PA</option>
          <option value="8">SEATTLE, WA</option>
          <option value="9">DALLAS, TX</option>
          <option value="10">MIAMI, FL</option>
          <option value="11">MINNEAPOLIS, MN</option>
          <option value="12">DENVER, CO</option>
          <option value="13">CHARLOTTE, NC</option>
          
          <option value="other">CUSTOM</option>
        </select>
      </span>
      <!-- DYNAMIC DROPDOWN END -->

      <!-- ADDRESS SEARCH (shown inline when Other is selected) -->
      <div id="addressSearchWrapper" style="position: relative; display:none;">
        <input
          id="addressSearch"
          type="text"
          placeholder="Enter US city or zip code..."
          autocomplete="off"
          style="
            padding: 2px 10px;
            border: 2px solid #E8E7E2;
            border-radius: 4px;
            font-family: 'Syne', sans-serif;
            font-size: 16.72px;
            font-weight: 700;
            background: #F5F4F0;
            color: #989189;
            outline: none;
            width: 259px;
          "
        >
        <div id="suggestions"
          style="
            position: absolute;
            top: 100%;
            left: 0;
            min-width: 280px;
            background: white;
            border: 2px solid var(--taupe-l);
            border-top: none;
            border-radius: 0 0 6px 6px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 200;
          "></div>
      </div>
      <!-- ADDRESS SEARCH END -->
    </h3>

    <p>Outage Risk: <span id="risk">Loading...</span></p>
    <p>Temperature: <span id="temp">Loading...</span></p>
    <p>Wind Gusts: <span id="wind">Loading...</span></p>
  </div>
</div>


<div id="advice" style="display:none;"></div>

<!-- Map Container -->
<div id="map"></div>

<!-- Gradient Key -->
<div style="width:88%; margin: 0 auto 40px; display:flex; align-items:center; gap:14px; font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--taupe-d);">
  <span>Low Risk</span>
  <div style="flex:1; height:12px; border-radius:6px; border:1.5px solid var(--taupe-l); background:linear-gradient(to right, hsl(85,88%,38%), hsl(60,88%,38%), hsl(30,88%,38%), hsl(0,88%,38%));"></div>
  <span>High Risk</span>
</div>

<!-- Email Alert Subscription -->
<div class="alert-section">
  <h3>&#9993; Get outage alerts by email</h3>
  <div class="alert-form">
    <input type="email" id="alert-email" placeholder="your@email.com" autocomplete="email"/>

    <select id="alert-city">
      <option value="Washington, DC">Washington, DC</option>
      <option value="New York City, NY">New York City, NY</option>
      <option value="Los Angeles, CA">Los Angeles, CA</option>
      <option value="Chicago, IL">Chicago, IL</option>
      <option value="Houston, TX">Houston, TX</option>
      <option value="Phoenix, AZ">Phoenix, AZ</option>
      <option value="Philadelphia, PA">Philadelphia, PA</option>
      <option value="Seattle, WA">Seattle, WA</option>
      <option value="Dallas, TX">Dallas, TX</option>
      <option value="Miami, FL">Miami, FL</option>
      <option value="Minneapolis, MN">Minneapolis, MN</option>
      <option value="Denver, CO">Denver, CO</option>
      <option value="Charlotte, NC">Charlotte, NC</option>
      <option value="custom">Custom Location</option>
    </select>

    <input
      type="text"
      id="alert-custom-city"
      placeholder="Enter city or ZIP"
      style="
        display:none;
        margin-top: 8px;
        padding:9px 14px;
        border: 2px solid var(--taupe-l);
        border-radius:6px;
        font-family:'Courier New', Courier, monospace;
        font-size: 13px;
      "
    >

    <button id="alert-btn" onclick="subscribeAlert()">Notify Me</button>
  </div>
  <div id="alert-msg"></div>
</div>

<footer>
  <div class="nav-logo">Grid<span style="color: var(--salmon);">Watch</span></div>
</footer>

<script>
const GEOAPIFY_KEY = "9852a6a8c89d4ca5ad87ac9305c4627c";

let map = L.map('map').setView([39.5, -98.35], 4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

function riskColor(risk) {
  let hue;
  if (risk < 0.3) hue = 85 - (risk / 0.3) * 25;
  else if (risk < 0.82) hue = 60 - ((risk - 0.3) / 0.52) * 35;
  else hue = 25 - ((risk - 0.82) / 0.18) * 25;
  return `hsl(${Math.round(hue)}, 88%, 38%)`;
}

function computeRisk(w) {
  let score = 0;
  if (w.wind_gusts_10m > 50) score += 0.4;
  else if (w.wind_gusts_10m > 35) score += 0.25;
  else if (w.wind_gusts_10m > 20) score += 0.1;

  if (w.wind_speed_10m > 40) score += 0.2;
  else if (w.wind_speed_10m > 25) score += 0.1;

  if (w.precipitation > 1) score += 0.3;
  else if (w.precipitation > 0.3) score += 0.15;

  if (w.snowfall > 2) score += 0.3;
  else if (w.snowfall > 0.5) score += 0.15;

  return Math.min(score, 1);
}

function updateUI(data, risk) {
  const color = riskColor(risk);

  document.getElementById("risk").innerText = (risk * 100).toFixed(1) + "%";
  document.getElementById("risk").style.color = color;

  document.getElementById("temp").innerText =
    data.temperature_2m.toFixed(1) + "°F";

  document.getElementById("wind").innerText =
    data.wind_gusts_10m.toFixed(1) + " mph gusts";
}

const searchInput = document.getElementById("addressSearch");
const suggestionsBox = document.getElementById("suggestions");

searchInput.addEventListener("input", async () => {
  const text = searchInput.value.trim();

  if (text.length < 3) {
    suggestionsBox.style.display = "none";
    return;
  }

  const url =
    `https://api.geoapify.com/v1/geocode/autocomplete?text=${encodeURIComponent(text)}` +
    `&limit=5&filter=countrycode:us&apiKey=${GEOAPIFY_KEY}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    suggestionsBox.innerHTML = "";

    if (!data.features?.length) {
      suggestionsBox.style.display = "none";
      return;
    }

    data.features.forEach(place => {
      const { lat, lon, formatted } = place.properties;

      const div = document.createElement("div");
      div.textContent = formatted;
      div.style.padding = "8px";
      div.style.cursor = "pointer";

      div.onclick = async () => {
        searchInput.value = formatted;
        suggestionsBox.style.display = "none";

        map.setView([lat, lon], 11);

        
        const weatherUrl =
          `https://api.open-meteo.com/v1/forecast` +
          `?latitude=${lat}&longitude=${lon}` +
          `&current=temperature_2m,wind_speed_10m,wind_gusts_10m,precipitation,snowfall` +
          `&temperature_unit=fahrenheit`;

        try {
          const res = await fetch(weatherUrl);
          const weather = await res.json();

          const risk = computeRisk(weather.current);

          L.circleMarker([lat, lon], {
            radius: 12,
            fillColor: riskColor(risk),
            fillOpacity: 0.9,
            color: "#2a2a2a",
            weight: 1.5
          }).addTo(map);

          updateUI(weather.current, risk);

        } catch (err) {
          console.error("Weather fetch failed", err);
        }
      };

      suggestionsBox.appendChild(div);
    });

    suggestionsBox.style.display = "block";

  } catch (err) {
    console.error("Geoapify error", err);
  }
});


document.getElementById("options").addEventListener("change", () => {
  const wrapper = document.getElementById("addressSearchWrapper");

  if (document.getElementById("options").value === "other") {
    wrapper.style.display = "block";
  } else {
    wrapper.style.display = "none";
  }
});
</script>

</body>
</html>
