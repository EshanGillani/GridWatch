<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GridWatch | Predictions</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Leaflet Map Library -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --taupe:#C8C0B8; --salmon:#FF8B80; --charcoal:#484848;
      --cream:#F5F4F0; --cream2:#ECEAE4; --paper:#FAF9F6;
      --taupe-d:#9a9188; --taupe-l:#dedad5; --salmon-d:#e56b5f;
      --mint:#8EE07A;
    }

    body {
      background: var(--cream);
      color: var(--charcoal);
      font-family: 'DM Sans', sans-serif;
      margin: 0;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 56px;
      background: var(--charcoal);
      border-bottom: 3px solid var(--salmon);
      display: flex;
      align-items: center;
      padding: 0 6vw;
      gap: 2px;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 22px;
      color: var(--cream);
      margin-right: 40px;
    }

    .nav-logo em { color: var(--salmon); }

    .nav-btn {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--taupe);
      padding: 6px 18px;
      cursor: pointer;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
    }

    .nav-btn.active {
      color: var(--salmon);
      border-bottom-color: var(--salmon);
    }
    .nav-btn.expert-btn { margin-left: auto; color: var(--charcoal); background: var(--salmon); border-radius: 4px; padding: 6px 14px; border-bottom: none; }
    .nav-btn.expert-btn:hover { background: var(--salmon-d); color: var(--charcoal); }

    .content {
      padding: 72px 6vw 30px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(40px,7vw,80px);
      margin-bottom: 16px;
    }

    h1 em { color: var(--salmon); }

    h3 {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      text-transform: uppercase;
      color: var(--taupe-d);
      margin-bottom: 12px;
    }

    p {
      font-size: 14px;
      line-height: 1.85;
      color: var(--taupe-d);
      max-width: 520px;
    }

    /* Map styling */
    #map {
      width: 88%;
      height: 500px;
      margin: 40px auto;
      border-radius: 10px;
      border: 3px solid var(--salmon);
    }

    footer {
      background: var(--charcoal);
      border-top: 3px solid var(--salmon);
      padding: 20px 6vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-logo {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 16px;
      color: var(--cream);
    }

    .footer-logo em { color: var(--salmon); }

    #advice {
      width: 88%;
      margin: 0 auto 40px;
      border: 2px solid var(--taupe-l);
      border-radius: 8px;
      padding: 24px 28px;
      background: var(--paper);
    }
    #advice .advice-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    #advice .advice-status {
      font-size: 13px;
      color: var(--taupe-d);
      margin-bottom: 14px;
    }
    #advice ul {
      list-style: none;
      padding: 0;
    }
    #advice ul li {
      font-size: 14px;
      color: var(--taupe-d);
      line-height: 1.7;
      padding: 3px 0 3px 18px;
      position: relative;
    }
    #advice ul li::before {
      content: "—";
      position: absolute;
      left: 0;
      color: var(--taupe);
    }

    /* Email alert subscription */
    .alert-section {
      width: 88%;
      max-width: 560px;
      margin: 0 auto 60px;
      background: var(--paper);
      border: 2px solid var(--taupe-l);
      border-radius: 10px;
      padding: 28px 32px;
      text-align: center;
    }

    .alert-section h3 {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--taupe-d);
      margin-bottom: 18px;
    }

    .alert-form {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .alert-form input[type="email"] {
      flex: 1 1 180px;
      min-width: 0;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 9px 14px;
      border: 2px solid var(--taupe-l);
      border-radius: 6px;
      background: var(--cream);
      color: var(--charcoal);
      outline: none;
      transition: border-color .15s;
    }

    .alert-form input[type="email"]:focus {
      border-color: var(--salmon);
    }

    .alert-form select {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 9px 30px 9px 12px;
      border: 2px solid var(--taupe-l);
      border-radius: 6px;
      background: var(--cream);
      color: var(--charcoal);
      outline: none;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2212%22%20height%3D%2212%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%239a9188%22%20stroke-width%3D%223%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E');
      background-repeat: no-repeat;
      background-position: right 8px center;
    }

    .alert-form select:focus {
      border-color: var(--salmon);
    }

    .alert-form button {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 9px 20px;
      background: var(--salmon);
      color: var(--charcoal);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }

    .alert-form button:hover { background: var(--salmon-d); }
    .alert-form button:disabled { opacity: .6; cursor: default; }

    #alert-msg {
      margin-top: 12px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
    }
    #alert-msg.ok  { color: hsl(120,60%,35%); }
    #alert-msg.err { color: var(--salmon-d); }

  </style>
</head>

<body>

<nav>
  <div class="nav-logo">Grid<span style="color: var(--salmon);">Watch</div>
  <button class="nav-btn" onclick="location.href='main.html'">Home</button>
  <button class="nav-btn active" onclick="location.href='predictions.html'">Predictions</button>
  <button class="nav-btn" onclick="location.href='about.html'">About</button>
  <button class="nav-btn expert-btn" onclick="location.href='expert-login.html'">Expert Mode</button>
</nav>

<div class="content">
  <h1>
    Prediction & <span style="color: var(--salmon);">Analysis</span>
  </h1>

  <h3>Live outage risk predictions powered by weather data.</h3>
  
  <div class="prediction-box">
    <!-- Wrap the label and the dynamic dropdown in a flex h3 to keep them inline -->
    <h3 style="font-family: 'Syne', sans-serif; font-weight: 700; color: #989189; display: flex; align-items: center; flex-wrap: wrap; gap: 8px;">
      Current live predictions for 
      
      <!-- DYNAMIC DROPDOWN START -->
      <span style="display: inline-grid; vertical-align: middle; align-items: center;">
        <!-- Invisible mirror that dictates the width -->
        <span id="mirror" style="
          grid-area: 1/1;
          visibility: hidden;
          white-space: pre;
          font-family: 'Syne', sans-serif;
          font-size: 16.72px;
          font-weight: 700;
          padding: 0 25px 0 6px;
        ">RICHMOND, VA</span>

        <select id="options" name="options" 
                oninput="document.getElementById('mirror').textContent = this.options[this.selectedIndex].text"
                style="
                  grid-area: 1/1;
                  width: 100%;
                  font-family: 'Syne', sans-serif;
                  background-color: #F5F4F0; 
                  color: #989189;
                  padding: 2px 25px 2px 6px; 
                  border: 2px solid #E8E7E2; 
                  border-radius: 4px;
                  outline: none;
                  font-size: 16.72px; 
                  font-weight: 700;
                  -webkit-appearance: none; 
                  appearance: none;
                  cursor: pointer;
                  background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2212%22%20height%3D%2212%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23989189%22%20stroke-width%3D%223%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E');
                  background-repeat: no-repeat;
                  background-position: right 6px center;
                ">
          <option value="1">RICHMOND, VA</option>
          <option value="2">VIRGINIA BEACH, VA</option>
          <option value="3">NORFOLK, VA</option>
          <option value="4">ARLINGTON, VA</option>
          <option value="5">ROANOKE, VA</option>
          <option value="6">CHARLOTTESVILLE, VA</option>
          <option value="7">NEWPORT NEWS, VA</option>
          <option value="8">HAMPTON, VA</option>
          <option value="9">CHESAPEAKE, VA</option>
          <option value="10">ALEXANDRIA, VA</option>
        </select>
      </span>
      <!-- DYNAMIC DROPDOWN END -->
    </h3>

    <p>Outage Risk: <span id="risk">Loading...</span></p>
    <p>Temperature: <span id="temp">Loading...</span></p>
    <p>Wind Gusts: <span id="wind">Loading...</span></p>
  </div>
</div>


<div id="advice" style="display:none;"></div>

<!-- Map Container -->
<div id="map"></div>

<!-- Gradient Key -->
<div style="width:88%; margin: 0 auto 40px; display:flex; align-items:center; gap:14px; font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--taupe-d);">
  <span>Low Risk</span>
  <div style="flex:1; height:12px; border-radius:6px; border:1.5px solid var(--taupe-l); background:linear-gradient(to right, hsl(120,88%,38%), hsl(60,88%,38%), hsl(0,88%,38%));"></div>
  <span>High Risk</span>
</div>

<!-- Email Alert Subscription -->
<div class="alert-section">
  <h3>&#9993; Get outage alerts by email</h3>
  <div class="alert-form">
    <input type="email" id="alert-email" placeholder="your@email.com" autocomplete="email"/>

    <select id="alert-city">
      <option value="Richmond, VA">Richmond, VA</option>
      <option value="Virginia Beach, VA">Virginia Beach, VA</option>
      <option value="Norfolk, VA">Norfolk, VA</option>
      <option value="Arlington, VA">Arlington, VA</option>
      <option value="Roanoke, VA">Roanoke, VA</option>
      <option value="Charlottesville, VA">Charlottesville, VA</option>
      <option value="Newport News, VA">Newport News, VA</option>
      <option value="Hampton, VA">Hampton, VA</option>
      <option value="Chesapeake, VA">Chesapeake, VA</option>
      <option value="Alexandria, VA">Alexandria, VA</option>
    </select>

    <button id="alert-btn" onclick="subscribeAlert()">Notify Me</button>
  </div>
  <div id="alert-msg"></div>
</div>

<footer>
  <div class="nav-logo">Grid<span style="color: var(--salmon);">Watch</div>
</footer>

<script>

const cities = {
  "1":  { name:"Richmond, VA",        lat:37.5538, lon:-77.4603 },
  "2":  { name:"Virginia Beach, VA",  lat:36.8529, lon:-75.9780 },
  "3":  { name:"Norfolk, VA",         lat:36.8508, lon:-76.2859 },
  "4":  { name:"Arlington, VA",       lat:38.8816, lon:-77.0910 },
  "5":  { name:"Roanoke, VA",         lat:37.2709, lon:-79.9414 },
  "6":  { name:"Charlottesville, VA", lat:38.0293, lon:-78.4767 },
  "7":  { name:"Newport News, VA",    lat:37.0871, lon:-76.4730 },
  "8":  { name:"Hampton, VA",         lat:37.0299, lon:-76.3452 },
  "9":  { name:"Chesapeake, VA",      lat:36.7682, lon:-76.2875 },
  "10": { name:"Alexandria, VA",      lat:38.8048, lon:-77.0469 }
};

let map = L.map('map').setView([37.5538, -77.4603], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

/* green (120) → yellow (60) → red (0) based on risk 0..1 */
function riskColor(risk) {
  const hue = Math.round((1 - risk) * 120);
  return `hsl(${hue}, 88%, 38%)`;
}

function computeRisk(w) {
  let score = 0;
  const gusts  = w.wind_gusts_10m || 0;
  const wind   = w.wind_speed_10m || 0;
  const precip = w.precipitation  || 0;
  const snow   = w.snowfall       || 0;

  if      (gusts > 50) score += 0.40;
  else if (gusts > 35) score += 0.25;
  else if (gusts > 20) score += 0.10;

  if      (wind > 40) score += 0.20;
  else if (wind > 25) score += 0.10;

  if      (precip > 1.0) score += 0.30;
  else if (precip > 0.3) score += 0.15;

  if      (snow > 2)   score += 0.30;
  else if (snow > 0.5) score += 0.15;

  return Math.min(1, score);
}

/* city id → { marker, risk, w } */
let cityData = {};

async function loadAllCities() {
  const entries = Object.entries(cities);

  /* Single batched request — comma-separated lat/lon for all cities */
  const lats = entries.map(([, c]) => c.lat).join(",");
  const lons = entries.map(([, c]) => c.lon).join(",");
  const url  =
    `https://api.open-meteo.com/v1/forecast` +
    `?latitude=${lats}&longitude=${lons}` +
    `&current=temperature_2m,relative_humidity_2m,wind_speed_10m,` +
    `wind_gusts_10m,precipitation,snowfall,cloud_cover` +
    `&temperature_unit=fahrenheit`;

  let weatherList;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    /* API returns an array when multiple locations are requested */
    weatherList = Array.isArray(data) ? data : [data];
  } catch (err) {
    console.error("Weather fetch failed:", err);
    return;
  }

  /* Clear old markers */
  Object.values(cityData).forEach(d => map.removeLayer(d.marker));
  cityData = {};

  entries.forEach(([id, city], i) => {
    const w = weatherList[i]?.current;
    if (!w) return;
    const risk = computeRisk(w);
    const color = riskColor(risk);

    const m = L.circleMarker([city.lat, city.lon], {
      radius: 12,
      color: '#2a2a2a',
      weight: 1.5,
      fillColor: color,
      fillOpacity: 0.88
    })
    .addTo(map)
    .bindPopup(
      `<b>${city.name}</b><br>` +
      `Outage Risk: <b style="color:${color}">${(risk * 100).toFixed(1)}%</b>`
    );

    cityData[id] = { marker: m, risk, w };
  });

  updatePanel();
}

function getRiskAdvice(pct) {
  if (pct < 20) return {
    emoji: "🟢", label: "Minimal Risk", color: "hsl(120,88%,38%)",
    status: "Grid conditions are stable.",
    actions: [
      "No action needed.",
      "Continue normal activities.",
      "Monitor the dashboard periodically for updates."
    ]
  };
  if (pct < 40) return {
    emoji: "🟡", label: "Low Risk", color: "hsl(60,88%,38%)",
    status: "Slight instability detected, but outages are unlikely.",
    actions: [
      "Stay aware of weather or grid alerts.",
      "Charge essential devices if severe weather is expected.",
      "Check the dashboard for updates."
    ]
  };
  if (pct < 60) return {
    emoji: "🟠", label: "Moderate Risk", color: "hsl(30,88%,38%)",
    status: "Conditions indicate a possible disruption.",
    actions: [
      "Ensure phones and essential devices are charged.",
      "Identify backup lighting (flashlights, batteries).",
      "Avoid scheduling critical power-dependent activities.",
      "Monitor updates more frequently."
    ]
  };
  if (pct < 80) return {
    emoji: "🔴", label: "High Risk", color: "hsl(0,88%,38%)",
    status: "Strong likelihood of outages developing.",
    actions: [
      "Fully charge phones, laptops, and battery packs.",
      "Prepare backup lighting and essential supplies.",
      "Save important work and data.",
      "Limit use of high-power appliances.",
      "Enable outage alerts if available."
    ]
  };
  return {
    emoji: "⚫", label: "Severe Risk", color: "#222",
    status: "Outage is highly likely or imminent.",
    actions: [
      "Prepare for possible loss of electricity.",
      "Charge all critical devices immediately.",
      "Secure backup power if available (generators, power banks).",
      "Keep flashlights and emergency supplies accessible.",
      "Avoid using elevators or equipment requiring continuous power.",
      "Follow local emergency updates."
    ]
  };
}

function updatePanel() {
  const id   = document.getElementById("options").value;
  const city = cities[id];
  map.setView([city.lat, city.lon], 8);

  const d = cityData[id];
  if (!d) {
    document.getElementById("risk").innerText  = "Unavailable";
    document.getElementById("temp").innerText  = "Unavailable";
    document.getElementById("wind").innerText  = "Unavailable";
    document.getElementById("risk").style.color = "";
    return;
  }

  const color = riskColor(d.risk);
  const riskEl = document.getElementById("risk");
  riskEl.innerText    = (d.risk * 100).toFixed(1) + "%";
  riskEl.style.color  = color;
  riskEl.style.fontWeight = "700";

  document.getElementById("temp").innerText =
    d.w.temperature_2m.toFixed(1) + "°F";
  document.getElementById("wind").innerText =
    d.w.wind_gusts_10m.toFixed(1) + " mph gusts";

  const pct = d.risk * 100;
  const adv = getRiskAdvice(pct);
  const advEl = document.getElementById("advice");
  advEl.style.display = "block";
  advEl.style.borderColor = adv.color;
  advEl.innerHTML =
    `<div class="advice-title" style="color:${adv.color}">${adv.emoji} ${adv.label}</div>` +
    `<div class="advice-status"><strong>Status:</strong> ${adv.status}</div>` +
    `<strong style="font-family:'Syne',sans-serif;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--taupe-d);">Recommended Actions</strong>` +
    `<ul>${adv.actions.map(a => `<li>${a}</li>`).join("")}</ul>`;
}

document.getElementById("options").addEventListener("change", updatePanel);

loadAllCities();

async function subscribeAlert() {
  const email = document.getElementById("alert-email").value.trim();
  const city  = document.getElementById("alert-city").value;
  const btn   = document.getElementById("alert-btn");
  const msg   = document.getElementById("alert-msg");

  msg.textContent = "";
  msg.className   = "";

  if (!email) {
    msg.textContent = "Please enter your email address.";
    msg.className   = "err";
    return;
  }

  btn.disabled    = true;
  btn.textContent = "Subscribing…";

  try {
    const res  = await fetch("/api/subscribe", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ email, city }),
    });
    const data = await res.json();

    if (res.ok) {
      msg.textContent = data.message;
      msg.className   = "ok";
      document.getElementById("alert-email").value = "";
    } else {
      msg.textContent = data.error || "Something went wrong. Please try again.";
      msg.className   = "err";
    }
  } catch {
    msg.textContent = "Network error — please try again.";
    msg.className   = "err";
  } finally {
    btn.disabled    = false;
    btn.textContent = "Notify Me";
  }
}

</script>

</body>
</html>
