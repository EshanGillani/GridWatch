<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
   <link rel="icon" href="gridwatch logo.svg" type="image/svg+xml" sizes="any">
  <title>GridWatch | Expert Mode</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --taupe: #C8C0B8; --salmon: #FF8B80; --charcoal: #484848;
      --cream: #F5F4F0; --paper: #FAF9F6;
      --taupe-d: #9a9188; --taupe-l: #dedad5; --salmon-d: #e56b5f;
      --mint: #8EE07A;
    }
    body { background: var(--cream); color: var(--charcoal); font-family: 'DM Sans', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    nav {
      position: sticky; top: 0; z-index: 100;
      height: 56px; background: var(--charcoal);
      border-bottom: 3px solid var(--salmon);
      display: flex; align-items: center; padding: 0 6vw; gap: 2px;
    }
    .nav-logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 22px; color: var(--cream); margin-right: 40px; flex-shrink: 0; }
    .nav-logo em { color: var(--salmon); font-style: normal; }
    .nav-btn {
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase; color: var(--taupe);
      padding: 6px 18px; cursor: pointer; background: transparent; border: none;
      border-bottom: 2px solid transparent; transition: color .15s;
    }
    .nav-btn:hover { color: var(--cream); }
    .nav-btn.active { color: var(--salmon); border-bottom-color: var(--salmon); }
    .nav-btn.expert-btn { margin-left: auto; color: var(--charcoal); background: var(--salmon); border-radius: 4px; padding: 6px 14px; border-bottom: none; }
    .nav-btn.expert-btn:hover { background: var(--salmon-d); color: var(--charcoal); }

    .content { flex: 1; padding: 48px 6vw 80px; }
    h1 { font-family: 'Playfair Display', serif; font-weight: 900; font-size: clamp(32px, 5vw, 60px); line-height: 1; letter-spacing: -.02em; margin-bottom: 8px; }
    h1 em { color: var(--salmon); font-style: normal; }
    .subtitle { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--taupe-d); margin-bottom: 36px; }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      align-items: start;
    }
    @media (max-width: 800px) { .two-col { grid-template-columns: 1fr; } }

    .section-label {
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; color: var(--taupe-d);
      margin-bottom: 10px;
    }

    .map-wrap {
      border: 3px solid var(--charcoal);
      box-shadow: 8px 8px 0 var(--taupe);
      overflow: hidden;
      line-height: 0;
    }
    .map-wrap iframe {
      width: 100%; height: 480px; border: none; display: block;
    }

    .notes-card {
      background: var(--paper);
      border: 3px solid var(--charcoal);
      box-shadow: 8px 8px 0 var(--taupe);
      padding: 28px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .notes-card label {
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase; color: var(--taupe-d);
      display: block; margin-bottom: 6px;
    }
    .notes-card input[type="text"],
    .notes-card textarea {
      width: 100%; padding: 10px 12px;
      border: 2px solid var(--charcoal); background: var(--cream);
      font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--charcoal);
      outline: none; resize: vertical;
      transition: border-color .15s;
    }
    .notes-card input[type="text"]:focus,
    .notes-card textarea:focus { border-color: var(--salmon); }
    .notes-card textarea { min-height: 220px; }
    .file-upload-label {
      display: block; width: 100%;
      border: 2px dashed var(--charcoal); background: var(--cream);
      padding: 18px 12px; text-align: center; cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase; color: var(--taupe-d);
      transition: border-color .15s, color .15s;
    }
    .file-upload-label:hover { border-color: var(--salmon); color: var(--salmon); }
    .file-upload-label input[type="file"] { display: none; }
    .file-names { font-family: 'Syne Mono', monospace; font-size: 10px; color: var(--taupe-d); margin-top: 6px; min-height: 14px; }
    .submit-btn {
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      background: var(--salmon); color: var(--charcoal);
      border: none; padding: 12px 24px; cursor: pointer;
      transition: background .15s; align-self: flex-start;
    }
    .submit-btn:hover { background: var(--salmon-d); }
    .success-msg {
      display: none;
      font-family: 'Syne Mono', monospace; font-size: 11px;
      color: var(--mint); letter-spacing: .08em;
    }

    footer { background: var(--charcoal); border-top: 3px solid var(--salmon); padding: 20px 6vw; display: flex; justify-content: space-between; align-items: center; }
    .footer-logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 16px; color: var(--cream); }
    .footer-logo em { color: var(--salmon); font-style: normal; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">Grid<em>Watch</em></div>
    <button class="nav-btn" onclick="location.href='index.html'">Home</button>
    <button class="nav-btn" onclick="location.href='predictions.html'">Predictions</button>
    <button class="nav-btn" onclick="location.href='about.html'">About</button>
    <button class="nav-btn" onclick="location.href='report.html'">Report Risk/Outage</button>
    <button class="nav-btn expert-btn active" onclick="location.href='expert-login.html'">Expert Mode</button>
  </nav>

  <div class="content">
    <h1>Expert<em> Mode</em></h1>
    <div class="subtitle">Field view &amp; analyst notes</div>

    <div class="two-col">

      <!-- Google Maps Street View -->
      <div>
        <div class="section-label">Street View</div>
        <div id="sv-location-label" style="font-family:'Syne Mono',monospace;font-size:10px;color:var(--taupe-d);margin-bottom:6px;letter-spacing:.05em;"></div>
        <div class="map-wrap">
          <iframe id="sv-frame"
            src=""
            allowfullscreen
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
      </div>

      <!-- Notes Form -->
      <div>
        <div class="section-label">Analyst Notes</div>
        <div class="notes-card">
          <div>
            <label for="note-location">Location / Incident ID</label>
            <input type="text" id="note-location" placeholder="e.g. Wolf Trap substation, #48821"/>
          </div>
          <div>
            <label for="note-body">Notes</label>
            <textarea id="note-body" placeholder="For beta testers, screenshot and annotate the map view for potential risks to existing power infrastructure such as extensive tree extension jeopardizing power lines, etc..."></textarea>
          </div>
          <div>
            <label>Attachments</label>
            <label class="file-upload-label">
              + Attach screenshots or files
              <input type="file" id="note-files" multiple accept="image/*,.pdf,.txt"/>
            </label>
            <div class="file-names" id="file-names"></div>
          </div>
          <button class="submit-btn" onclick="submitNote()">Submit Note</button>
          <div class="success-msg" id="success-msg">Note submitted successfully.</div>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <div class="footer-logo">Grid<em>Watch</em></div>
  </footer>

  <script>
    const API_KEY = 'AIzaSyD_gWAlBJ70qpRMw1tLRgK-vwUz5p3f_6A';

    const LOCATIONS = [
      { lat: 38.0635, lon: -77.7870, label: 'North Anna Nuclear - Haley Dr transmission corridor' },
      { lat: 37.1659, lon: -76.6970, label: 'Surry Nuclear - Route 650 500kV transmission towers' },
      { lat: 38.5376, lon: -77.2786, label: 'Possum Point Power Station - Route 1 transmission corridor' },
      { lat: 37.3500, lon: -77.3820, label: 'Chesterfield Power Station - Coxendale Rd 500kV corridor' },
      { lat: 36.8230, lon: -79.7710, label: 'Clover Power Station - Route 92 transmission line' },
      { lat: 39.2005, lon: -79.2647, label: 'Mount Storm Power Station - WV-93 transmission towers' },
      { lat: 38.7300, lon: -77.5250, label: 'Gainesville Substation - Route 29 transmission crossing' },
      { lat: 38.8550, lon: -77.4000, label: 'Morrisville Substation - US-17 500kV corridor' },
      { lat: 37.5290, lon: -77.4360, label: 'Chesterfield Substation - Chippenham Pkwy 230kV crossing' },
      { lat: 37.2750, lon: -76.7140, label: 'Skiffes Creek Switching Station - Route 60 500kV towers' },
    ];
    const pick = LOCATIONS[Math.floor(Math.random() * LOCATIONS.length)];
    document.getElementById('sv-frame').src =
      `https://www.google.com/maps/embed/v1/streetview?key=${API_KEY}&location=${pick.lat},${pick.lon}&heading=210&pitch=0&fov=80`;
    document.getElementById('sv-location-label').textContent = pick.label;

    document.getElementById('note-files').addEventListener('change', function() {
      const names = Array.from(this.files).map(f => f.name).join(', ');
      document.getElementById('file-names').textContent = names || '';
    });

    async function submitNote() {
      const loc   = document.getElementById('note-location').value.trim();
      const body  = document.getElementById('note-body').value.trim();
      const files = document.getElementById('note-files').files;
      if (!body) { document.getElementById('note-body').focus(); return; }

      const btn = document.querySelector('.submit-btn');
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      const fd = new FormData();
      fd.append('location', loc || '(none)');
      fd.append('notes', body);
      fd.append('map_location', document.getElementById('sv-location-label').textContent);
      Array.from(files).forEach(f => fd.append('attachment', f));

      try {
        const res = await fetch('https://formspree.io/f/xqeyayep', {
          method: 'POST', body: fd, headers: { 'Accept': 'application/json' }
        });
        if (!res.ok) throw new Error('Server error');
        document.getElementById('note-location').value = '';
        document.getElementById('note-body').value = '';
        document.getElementById('note-files').value = '';
        document.getElementById('file-names').textContent = '';
        const msg = document.getElementById('success-msg');
        msg.style.display = 'block';
        setTimeout(() => { msg.style.display = 'none'; }, 3000);
      } catch (e) {
        alert('Submission failed — check your connection and try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Submit Note';
      }
    }
  </script>
</body>
</html>
