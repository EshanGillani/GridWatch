<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GridWatch | Live Reports</title>
  <link rel="icon" href="gridwatch logo.svg" type="image/svg+xml" sizes="any">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --taupe: #C8C0B8; --salmon: #FF8B80; --charcoal: #484848;
      --cream: #F5F4F0; --cream2: #ECEAE4; --paper: #FAF9F6;
      --taupe-d: #9a9188; --taupe-l: #dedad5; --salmon-d: #e56b5f;
      --mint: #8EE07A;
    }
    body { background: var(--cream); color: var(--charcoal); font-family: 'DM Sans', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }

    nav {
      position: sticky; top: 0; z-index: 100;
      height: 56px; background: var(--charcoal);
      border-bottom: 3px solid var(--salmon);
      display: flex; align-items: center; padding: 0 6vw; gap: 2px;
    }
    .nav-logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 22px; color: var(--cream); margin-right: 40px; flex-shrink: 0; }
    .nav-logo em { color: var(--salmon); font-style: normal; }
    .nav-btn {
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase; color: var(--taupe);
      padding: 6px 18px; cursor: pointer; background: transparent; border: none;
      border-bottom: 2px solid transparent; transition: color .15s;
    }
    .nav-btn:hover { color: var(--cream); }
    .nav-btn.active { color: var(--salmon); border-bottom-color: var(--salmon); }
    .nav-btn.expert-btn { margin-left: auto; color: var(--charcoal); background: var(--salmon); border-radius: 4px; padding: 6px 14px; border-bottom: none; }
    .nav-btn.expert-btn:hover { background: var(--salmon-d); color: var(--charcoal); }

    .main-content { flex: 1; padding: 48px 6vw 72px; }

    h1 { font-family: 'Playfair Display', serif; font-weight: 900; font-size: clamp(32px, 5vw, 60px); line-height: 1; letter-spacing: -.02em; margin-bottom: 8px; }
    h1 em { color: var(--salmon); font-style: normal; }
    h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: .04em; text-transform: uppercase; color: var(--taupe-d); margin-bottom: 24px; }

    .controls {
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .controls input[type="text"] {
      font-family: 'Syne Mono', monospace; font-size: 12px;
      background: var(--paper); border: 2px solid var(--charcoal);
      color: var(--charcoal); padding: 8px 14px; outline: none;
      width: 180px;
    }
    .controls input[type="text"]::placeholder { color: var(--taupe); }
    .controls button {
      font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      background: var(--salmon); color: var(--charcoal);
      border: none; padding: 9px 20px; cursor: pointer; border-radius: 4px;
      transition: background .15s;
    }
    .controls button:hover { background: var(--salmon-d); }

    .table-wrap {
      border: 3px solid var(--charcoal);
      box-shadow: 8px 8px 0px var(--taupe);
      overflow-x: auto;
      background: var(--paper);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead tr {
      background: var(--charcoal);
      color: var(--cream);
    }

    th {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 12px 16px;
      text-align: left;
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--taupe-l);
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }

    /* Summary rows */
    tr.report-row {
      cursor: pointer;
      transition: background .12s;
    }
    tr.report-row:hover { background: var(--cream2); }
    tr.report-row.open { background: var(--cream2); }

    .chevron {
      display: inline-block;
      font-size: 10px;
      color: var(--taupe-d);
      transition: transform .2s;
      user-select: none;
    }
    tr.report-row.open .chevron { transform: rotate(180deg); }

    /* Detail rows */
    tr.report-detail td {
      padding: 0;
      border-bottom: 2px solid var(--charcoal);
    }

    .detail-inner {
      overflow: hidden;
      max-height: 0;
      transition: max-height .3s ease;
    }
    tr.report-detail.open .detail-inner {
      max-height: 800px;
    }

    .detail-body {
      padding: 20px 24px 24px;
      background: var(--cream2);
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }

    .detail-text { flex: 1; min-width: 200px; }

    .detail-label {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--taupe-d);
      margin-bottom: 6px;
    }
    

    .detail-desc {
      font-size: 14px;
      line-height: 1.6;
      color: var(--charcoal);
      white-space: pre-wrap;
    }

    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 14px;
    }
    .meta-item { display: flex; flex-direction: column; gap: 3px; }
    .meta-value {
      font-family: 'Syne Mono', monospace;
      font-size: 12px;
      color: var(--charcoal);
    }

    .detail-image-wrap {
      flex-shrink: 0;
    }
    .detail-image-wrap img {
      display: block;
      max-width: 320px;
      max-height: 260px;
      width: auto;
      height: auto;
      border: 2px solid var(--charcoal);
      border-radius: 4px;
      object-fit: cover;
    }

    .badge {
      display: inline-block;
      font-family: 'Syne Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 3px;
    }
    .badge-power_outage    { background: #fce8e6; color: #c0392b; }
    .badge-flickering_power{ background: #fff3cd; color: #856404; }
    .badge-downed_line     { background: #e8e8e8; color: #333; }
    .badge-tree            { background: #e6f4ea; color: #2d6a2d; }
    .badge-other           { background: #e8eaf6; color: #3949ab; }

    .empty {
      text-align: center;
      padding: 48px 16px;
      color: var(--taupe-d);
      font-family: 'Syne Mono', monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo"><a href="main.html" style="color: inherit; text-decoration: none;">Grid<em>Watch</em></a></div>
    <button class="nav-btn" onclick="location.href='main.html'">Home</button>
    <button class="nav-btn" onclick="location.href='predictions.html'">Predictions</button>
    <button class="nav-btn" onclick="location.href='about.html'">About</button>
    <button class="nav-btn" onclick="location.href='report.html'">Report Risk/Outage</button>
    <button class="nav-btn active" onclick="location.href='reports.html'">View Reported Risks and Outages</button>
    <button class="nav-btn expert-btn" onclick="location.href='expert-login.html'">Expert Mode</button>
  </nav>

  <div class="main-content">
    <h1>Live Grid <em>Risk Reports</em></h1>
    <h3>Community-submitted outages and risks</h3>

    <div class="controls">
      <input id="zipFilter" type="text" placeholder="Filter by ZIP code">
      <button onclick="applyFilter()">Filter</button>
      <button onclick="clearFilter()">Show All</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>ZIP</th>
            <th>Type</th>
            <th>Description</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="reportBody">
          <tr><td colspan="5" class="empty">Loading reports...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const TYPE_LABELS = {
      power_outage: "Power Outage",
      flickering_power: "Flickering Power",
      downed_line: "Downed Power Line",
      tree: "Overhanging Tree / Hazard",
      other: "Other"
    };

    let allReports = [];

    async function loadReports() {
      const openIds = new Set(
        [...document.querySelectorAll("tr.report-detail.open")].map(el => el.id)
      );
      const res = await fetch("/api/reports");
      const data = await res.json();
      allReports = (data.reports || []).sort((a, b) => b.time - a.time);
      const zip = document.getElementById("zipFilter").value.trim();
      renderTable(zip ? allReports.filter(r => r.zip === zip) : allReports);
      openIds.forEach(id => {
        const detailRow = document.getElementById(id);
        if (detailRow) {
          detailRow.classList.add("open");
          const prevRow = detailRow.previousElementSibling;
          if (prevRow) prevRow.classList.add("open");
        }
      });
    }

    setInterval(loadReports, 5000);

    function renderTable(reports) {
      const tbody = document.getElementById("reportBody");
      if (reports.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">No reports found.</td></tr>';
        return;
      }
      tbody.innerHTML = reports.map((r, i) => {
        const date = new Date(r.time).toLocaleString();
        const label = TYPE_LABELS[r.type] || r.type;
        const badgeClass = "badge badge-" + (r.type || "other");
        const descSnippet = r.description
          ? escapeHtml(r.description.length > 60 ? r.description.slice(0, 60) + "…" : r.description)
          : "<em style='color:var(--taupe)'>—</em>";

        const fullDesc = r.description ? escapeHtml(r.description) : "";
        const imageHtml = r.image
          ? `<div class="detail-image-wrap"><img src="${escapeAttr(r.image)}" alt="Attached photo"></div>`
          : "";

        return `
          <tr class="report-row" onclick="toggleRow(${i})">
            <td style="font-family:'Syne Mono',monospace;font-size:12px;white-space:nowrap">${date}</td>
            <td style="font-family:'Syne Mono',monospace;font-size:13px">${escapeHtml(r.zip || "")}</td>
            <td><span class="${badgeClass}">${escapeHtml(label)}</span></td>
            <td>${descSnippet}</td>
            <td style="text-align:center;width:32px"><span class="chevron">&#9660;</span></td>
          </tr>
          <tr class="report-detail" id="detail-${i}">
            <td colspan="5">
              <div class="detail-inner">
                <div class="detail-body">
                  <div class="detail-text">
                    <div class="detail-meta">
                      <div class="meta-item">
                        <span class="detail-label">Time</span>
                        <span class="meta-value">${date}</span>
                      </div>
                      <div class="meta-item">
                        <span class="detail-label">ZIP</span>
                        <span class="meta-value">${escapeHtml(r.zip || "—")}</span>
                      </div>
                      <div class="meta-item">
                        <span class="detail-label">Type</span>
                        <span class="meta-value"><span class="${badgeClass}">${escapeHtml(label)}</span></span>
                      </div>
                    </div>
                    <div class="detail-label">Description</div>
                    <div class="detail-desc">${fullDesc || "<em style='color:var(--taupe)'>No description provided.</em>"}</div>
                  </div>
                  ${imageHtml}
                </div>
              </div>
            </td>
          </tr>`;
      }).join("");
    }

    function toggleRow(i) {
      const detailRow = document.getElementById(`detail-${i}`);
      if (!detailRow) return;

      const prevRow = detailRow.previousElementSibling;

      const isOpen = detailRow.classList.contains("open");
      if (isOpen) {
        detailRow.classList.remove("open");
        if (prevRow) prevRow.classList.remove("open");
      } else {
        detailRow.classList.add("open");
        if (prevRow) prevRow.classList.add("open");
      }
    }

    function applyFilter() {
      const zip = document.getElementById("zipFilter").value.trim();
      if (!zip) { renderTable(allReports); return; }
      renderTable(allReports.filter(r => r.zip === zip));
    }

    function clearFilter() {
      document.getElementById("zipFilter").value = "";
      renderTable(allReports);
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function escapeAttr(str) {
      return String(str).replace(/"/g, "&quot;");
    }

    loadReports();
  </script>
</body>
</html>
